services:
  kucoin-lane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kucoin-lane
    restart: unless-stopped
    env_file:
      - ./config/.env
      - /home/we4free/.config/kucoin-lane/credentials.env
    environment:
      - MIN_NOTIONAL_USD=5.0
      - ACCOUNT_BALANCE=110.0
      - MAX_POSITION_SIZE_USD=55.0
      - MAX_OPEN_POSITIONS=1
      - TRADING_PAIRS=BTC/USDT
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
      - ./agent-logs:/app/agent-logs
      - ./config/coin_parameters.json:/app/config/coin_parameters.json:ro
      - ../Archivist-Agent/lanes/kucoin:/app/lanes/kucoin
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/src/execution/execution_engine.py') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"