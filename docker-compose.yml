version: "3.8"

services:
  kucoin-lane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kucoin-lane
    restart: unless-stopped
    env_file:
      - ./config/.env
      - /home/we4free/.config/kucoin-lane/credentials.env
    environment:
      - MIN_NOTIONAL_USD=5.0
      - ACCOUNT_BALANCE=110.0
      - MAX_POSITION_SIZE_USD=55.0
      - MAX_OPEN_POSITIONS=1
      - TRADING_PAIRS=BTC/USDT
      - CANDLE_INTERVAL=1day
      - STRATEGY=vol_breakout
      - CYCLE_INTERVAL=1
      - PAPER_TRADING=true
      - MODE=PAPER
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
      - ./agent-logs:/app/agent-logs
      - ./src:/app/src
      - ./config/asset_profiles.json:/app/config/asset_profiles.json:ro
      - ../Archivist-Agent/lanes/kucoin:/app/lanes/kucoin
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /app/lanes/kucoin/inbox/SESSION_STATE.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
